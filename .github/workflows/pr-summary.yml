name: pr-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summarise:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Summarise PR
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/deepseek-v4-flash
          prompt: |
            Write a brief high-level summary of the changes in this pull request.
            3-5 sentences. What changed and why. No preamble, no restating the title.
