name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summarise:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update PR description
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/deepseek-v4-flash
          share: false
          prompt: |
            Summarise the changes in this pull request at a high level.
            3-5 short paragraphs. Each point must be a separate paragraph (blank line between them) for readability.
            No preamble, no restating the title.

            Write the summary to the PR description with:
              gh pr edit ${{ github.event.pull_request.number }} --body "..."

            Do not post comments.
